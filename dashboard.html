<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #121212;
            color: white;
            font-weight: bold;
        }

        h1 {
            color: #00ffcc;
            font-weight: 900;
        }

        h2 {
            color: #ffffff;
            font-weight: 700;
        }

        label {
            color: #00ffcc;
        }

        .table {
            background-color: white;
            color: black;
        }

        .form-control, .form-select {
            background-color: #1f1f1f;
            color: white;
            border: 1px solid #00ffcc;
        }

        .form-control:focus, .form-select:focus {
            background-color: #1f1f1f;
            color: white;
            border-color: #00ffcc;
            box-shadow: none;
        }

        .btn-primary {
            background-color: #00ffcc;
            border: none;
            font-weight: bold;
        }

        .btn-success {
            font-weight: bold;
        }

        .btn-danger {
            font-weight: bold;
        }
    </style>
</head>

<body class="container mt-4">

<h1>SRI SRINIVASA ENTERPRISES</h1>
<h2>SPARES MANAGEMENT TRACKER</h2>
<hr>

<form method="POST" class="row g-3">

    <div class="col-md-3">
        <label>Date</label>
        <input type="date" name="date" class="form-control" required>
    </div>

    <div class="col-md-4">
        <label>Select Spare</label>
        <select name="spare" class="form-select">
            {% for spare in spares %}
                <option value="{{ spare }}">{{ spare }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-2">
        <label>Quantity</label>
        <input type="number" name="quantity" class="form-control" required>
    </div>

    <div class="col-md-3">
        <label>Action</label>
        <select name="action" class="form-select">
            <option value="inward">Inward</option>
            <option value="consume">Consume</option>
        </select>
    </div>

    <div class="col-md-4">
        <label>Customer Name (for consume)</label>
        <input type="text" name="customer" class="form-control">
    </div>

    <div class="col-md-3">
        <label>Warranty Status</label>
        <select name="warranty" class="form-select">
            <option value="">Select</option>
            <option value="In Warranty">In Warranty</option>
            <option value="Out of Warranty">Out of Warranty</option>
        </select>
    </div>

    <div class="col-md-12">
        <button type="submit" class="btn btn-primary">Submit</button>
        <a href="/download" class="btn btn-success">Download Excel</a>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
<button>
    <a href="/download_stock" class="btn btn-success">Download Stock Excel</a>
    <a href="/download_consumed" class="btn btn-warning">Download Consumed Excel</a>
    <a href="/download_pdf" class="btn btn-info">Download PDF</a>
</button>

</form>

<hr>

<h3>Available Stock</h3>

<div class="table-responsive">
    {{ tables|safe }}
</div>

</body>
</html>
